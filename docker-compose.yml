# Generated By: Claude Code (Claude Opus 4.6)
services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    volumes:
      - ./config/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:z
    ports:
      - "127.0.0.1:4317:4317"
      - "8889:8889"
    depends_on:
      - loki
      - tempo

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:z
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - otel-collector

  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/loki

  tempo:
    image: grafana/tempo:latest
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./config/tempo.yaml:/etc/tempo.yaml:z
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"

  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    ports:
      - "3000:3000"
    volumes:
      - ./config/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:z
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
      - tempo

  dashboard-sync:
    image: python:3-alpine
    depends_on:
      - grafana
    environment:
      GRAFANA_URL: http://grafana:3000
      DASHBOARDS_DIR: /dashboards
      INTERVAL: "10"
    volumes:
      - ./dashboards:/dashboards:z
      - ./bin/dashboard-sync.py:/dashboard-sync.py:ro,z
    command: python3 /dashboard-sync.py
    restart: on-failure

volumes:
  prometheus-data:
  loki-data:
  tempo-data:
  grafana-data:
