# Loki config — extends defaults with ruler remote write to Prometheus.
# Only sections that differ from defaults are specified here.

auth_enabled: false

schema_config:
  configs:
    - from: "2020-10-24"
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

storage_config:
  tsdb_shipper:
    active_index_directory: /loki/tsdb-index
    cache_location: /loki/tsdb-cache
  filesystem:
    directory: /loki/chunks

ruler:
  enable_api: true
  storage:
    type: local
    local:
      directory: /loki/rules
  remote_write:
    - url: http://prometheus:9090/api/v1/write
      queue_config:
        capacity: 500
        max_shards: 1
