# Generated By: Claude Code (Claude Opus 4.6)
# Loki config — single-node with ruler remote write to Prometheus.
# Storage paths match the defaults Loki used before this config file
# existed, preserving access to historical data in the volume.

auth_enabled: false

server:
  http_listen_port: 3100

common:
  path_prefix: /loki
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory
  replication_factor: 1

schema_config:
  configs:
    - from: "2020-10-24"
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h
        path_prefix: tables/

ingester:
  wal:
    dir: /loki/wal

compactor:
  working_directory: /loki/compactor

storage_config:
  tsdb_shipper:
    active_index_directory: /loki/tsdb-shipper-active
    cache_location: /loki/tsdb-shipper-cache
  filesystem:
    directory: /loki/chunks

ruler:
  enable_api: true
  rule_path: /loki/rules-temp
  wal:
    dir: /loki/ruler-wal
  storage:
    type: local
    local:
      directory: /loki/rules
  remote_write:
    enabled: true
    client:
      url: http://prometheus:9090/api/v1/write
