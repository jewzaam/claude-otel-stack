# Generated By: Claude Code (Claude Opus 4.6)
# Loki recording rules for Claude Code session state derivation.
# Evaluates native OTEL events from Claude Code and writes state
# metrics to Prometheus via remote write.
#
# Key gotchas (validated 2026-06-08):
# - Use observed_timestamp, not event_sequence (sequence resets across
#   session resumes / sandbox reconnects)
# - Filter to event_name="hook_execution_complete" for real hook events
#   (hook_registered events also carry hook_event labels but are not firings)
# - count_over_time does not support by() grouping — wrap with sum by()

groups:
  - name: claude-session-state
    interval: 5s
    rules:
      # WORKING: activity events in the last 60s.
      # Includes main thread and subagent events (same session_id).
      # Excludes housekeeping query sources that fire after Stop.
      - record: claude_session_working
        expr: |
          sum by (session_id, host_name, project, location) (
            count_over_time(
              {service_name="claude-code"}
              | event_name =~ "api_request|tool_decision|tool_result|skill_activated|subagent_completed"
              | query_source !~ "away_summary|compact|generate_session_title"
              | label_format location=`{{ if .sandbox_source }}~/sandboxes/{{ .sandbox_source }}{{ else if hasPrefix "sandbox" .host_name }}~/sandboxes/{{ regexReplaceAll "^sandbox-" .host_name "" }}{{ else }}{{ regexReplaceAll "^(/home/[^/]+|/Users/[^/]+)" .project "~" }}{{ end }}`
              [60s]
            )
          )

      # READY: Stop hook is the most recent significant event.
      # Compares observed_timestamp (nanoseconds) of last Stop vs last
      # activity event. Truthy when Stop is newer.
      # The `or vector(0)` handles sessions with Stop but no activity
      # events in the window (freshly started then immediately stopped).
      - record: claude_session_ready
        expr: |
          max by (session_id, host_name, project, location) (
            max_over_time(
              {service_name="claude-code"}
              | event_name = "hook_execution_complete"
              | hook_event = "Stop"
              | label_format location=`{{ if .sandbox_source }}~/sandboxes/{{ .sandbox_source }}{{ else if hasPrefix "sandbox" .host_name }}~/sandboxes/{{ regexReplaceAll "^sandbox-" .host_name "" }}{{ else }}{{ regexReplaceAll "^(/home/[^/]+|/Users/[^/]+)" .project "~" }}{{ end }}`
              | unwrap observed_timestamp [30m]
            ) by (session_id, host_name, project, location)
          )
          >
          (
            max by (session_id, host_name, project, location) (
              max_over_time(
                {service_name="claude-code"}
                | event_name =~ "api_request|tool_decision|tool_result|user_prompt|subagent_completed"
                | query_source !~ "away_summary|compact|generate_session_title"
                | label_format location=`{{ if .sandbox_source }}~/sandboxes/{{ .sandbox_source }}{{ else if hasPrefix "sandbox" .host_name }}~/sandboxes/{{ regexReplaceAll "^sandbox-" .host_name "" }}{{ else }}{{ regexReplaceAll "^(/home/[^/]+|/Users/[^/]+)" .project "~" }}{{ end }}`
                | unwrap observed_timestamp [30m]
              ) by (session_id, host_name, project, location)
            )
            or vector(0)
          )

      # PERMISSION_REQUIRED: PermissionRequest is the most recent significant event.
      # Uses timestamp comparison like READY — permission stays active until
      # a tool_result (permission granted) or Stop (denied/cancelled) fires.
      - record: claude_session_permission
        expr: |
          max by (session_id, host_name, project, location) (
            max_over_time(
              {service_name="claude-code"}
              | event_name = "hook_execution_complete"
              | hook_event = "PermissionRequest"
              | label_format location=`{{ if .sandbox_source }}~/sandboxes/{{ .sandbox_source }}{{ else if hasPrefix "sandbox" .host_name }}~/sandboxes/{{ regexReplaceAll "^sandbox-" .host_name "" }}{{ else }}{{ regexReplaceAll "^(/home/[^/]+|/Users/[^/]+)" .project "~" }}{{ end }}`
              | unwrap observed_timestamp [30m]
            ) by (session_id, host_name, project, location)
          )
          >
          (
            max by (session_id, host_name, project, location) (
              max_over_time(
                {service_name="claude-code"}
                | event_name =~ "tool_result|user_prompt"
                | query_source !~ "away_summary|compact|generate_session_title"
                | label_format location=`{{ if .sandbox_source }}~/sandboxes/{{ .sandbox_source }}{{ else if hasPrefix "sandbox" .host_name }}~/sandboxes/{{ regexReplaceAll "^sandbox-" .host_name "" }}{{ else }}{{ regexReplaceAll "^(/home/[^/]+|/Users/[^/]+)" .project "~" }}{{ end }}`
                | unwrap observed_timestamp [30m]
              ) by (session_id, host_name, project, location)
            )
            or vector(0)
          )
