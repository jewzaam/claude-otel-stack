# Generated By: Claude Code (Claude Opus 4.7)
# Local Grafana for fast dashboard iteration against tailscale-hosted Prom/Loki/Tempo.
# Decoupled from the main docker-compose.yml — run with:
#   podman-compose -f docker-compose.local.yml up -d
# Visit http://localhost:3001 (anonymous Admin).
# Dashboards in ./dashboards/ are auto-pushed every 10s by dashboard-sync.
services:
  grafana-local:
    image: grafana/grafana:latest
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_SECURITY_ALLOW_EMBEDDING=true
    ports:
      - "3001:3000"
    volumes:
      - ./config/grafana-datasources.local.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:z
      - grafana-local-data:/var/lib/grafana

  dashboard-sync-local:
    image: python:3-alpine
    depends_on:
      - grafana-local
    environment:
      GRAFANA_URL: http://grafana-local:3000
      DASHBOARDS_DIR: /dashboards
      INTERVAL: "10"
    volumes:
      - ./dashboards:/dashboards:z
      - ./bin/dashboard-sync.py:/dashboard-sync.py:ro,z
    command: python3 /dashboard-sync.py
    restart: on-failure

volumes:
  grafana-local-data:
